<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peña 3 Tiempo</title>

<link rel="icon" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">

<style>
body{margin:0;font-family:sans-serif;background:#0b1320;color:white}
.nav{position:fixed;bottom:0;width:100%;display:flex;justify-content:space-around;background:#111;padding:10px}
.page{display:none;padding:20px}
.active{display:block}
</style>
</head>

<body>

<div id="inicio" class="page active">
<h1>Inicio</h1>
</div>

<div id="jugadores" class="page">
<h1>Jugadores</h1>
<div id="listaJugadores">Aquí irían los jugadores</div>
</div>

<div id="partidos" class="page">
<h1>Partidos</h1>
<div id="crear">Crear partido</div>
<div id="activo" style="display:none">Partido en curso</div>
</div>

<div class="nav">
<button onclick="showPage('inicio')">Inicio</button>
<button onclick="showPage('jugadores')">Jugadores</button>
<button onclick="showPage('partidos')">Partidos</button>
</div>

<script>
let S = {
  activeMatch: true // simula partido activo
};

function el(id){ return document.getElementById(id); }

function showPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  el(name).classList.add('active');

  // FIX IMPORTANTE (lo que necesitabas)
  if(name==='partidos'){
    if(S.activeMatch){
      el('crear').style.display='none';
      el('activo').style.display='block';
    }else{
      el('crear').style.display='block';
      el('activo').style.display='none';
    }
  }
}
</script>

</body>
</html>
